<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Argus — Pentest Console</title>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--fg:#e6edf3;--mut:#8b949e;
        --crit:#f85149;--high:#ff8a50;--med:#e3b341;--low:#58a6ff;--info:#6e7681;--ok:#3fb950}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--fg);
    background:radial-gradient(1200px 600px at 80% -10%,rgba(88,166,255,.08),transparent 60%),
               radial-gradient(900px 500px at -10% 110%,rgba(63,185,80,.06),transparent 55%),var(--bg);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  header{padding:14px 24px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;gap:12px;position:sticky;top:0;z-index:10;
    background:rgba(13,17,23,.72);backdrop-filter:saturate(160%) blur(12px)}
  header h1{font-size:18px;margin:0;background:linear-gradient(90deg,#58a6ff,#3fb950);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .tag{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:12px;padding:2px 10px}
  main{display:grid;grid-template-columns:340px 1fr;gap:0;min-height:calc(100vh - 57px)}
  .side{border-right:1px solid var(--line);padding:20px;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}
  label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px}
  textarea,input,select{width:100%;background:#0d1117;border:1px solid var(--line);border-radius:8px;
    color:var(--fg);padding:9px;font-family:ui-monospace,Menlo,monospace}
  textarea{min-height:84px;resize:vertical}
  .row{display:flex;align-items:center;gap:8px;margin-top:10px}
  button{background:linear-gradient(180deg,#2ea043,#238636);border:0;color:#fff;padding:10px 16px;
    border-radius:8px;font-weight:600;cursor:pointer;width:100%;
    transition:filter .12s ease,transform .06s ease}
  button:hover{filter:brightness(1.08)} button:active{transform:translateY(1px)}
  button.sec{background:#21262d;border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:wait}
  textarea:focus,input:focus,select:focus{outline:none;border-color:var(--low);
    box-shadow:0 0 0 3px rgba(88,166,255,.25)}
  .content{padding:24px;overflow:auto}
  .kpis{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .kpi{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--line);
    border-radius:10px;padding:12px 16px;min-width:112px;box-shadow:0 1px 3px rgba(0,0,0,.3);
    transition:transform .12s ease,box-shadow .12s ease}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.35)}
  .kpi.k-blue{border-left-color:var(--low)} .kpi.k-red{border-left-color:var(--crit)}
  .kpi.k-amber{border-left-color:var(--med)} .kpi.k-green{border-left-color:var(--ok)}
  .kpi b{font-size:22px;display:block} .kpi span{font-size:11px;color:var(--mut)}
  table{width:100%;border-collapse:collapse;margin-top:6px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase}
  .sev{font-weight:700;padding:1px 8px;border-radius:10px;font-size:11px}
  .Critical{background:rgba(248,81,73,.15);color:var(--crit)} .High{background:rgba(255,138,80,.15);color:var(--high)}
  .Medium{background:rgba(227,179,65,.15);color:var(--med)} .Low{background:rgba(88,166,255,.15);color:var(--low)}
  .Info{background:rgba(110,118,129,.15);color:var(--info)}
  .muted{color:var(--mut)} .ok{color:var(--ok)} .err{color:var(--crit)}
  h2{font-size:14px;border-bottom:1px solid var(--line);padding-bottom:8px;margin:22px 0 6px}
  .path{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--high);
    border-radius:8px;padding:12px;margin:8px 0}
  code{background:#0d1117;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12px}
  tbody tr:hover,table tr:hover{background:rgba(88,166,255,.05)}
  @media (max-width:900px){
    main{grid-template-columns:1fr} .side{border-right:0;border-bottom:1px solid var(--line)}
    .content{padding:16px} .kpis{overflow-x:auto} table{display:block;overflow-x:auto;white-space:nowrap}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<header>
  <h1>🛡️ Argus</h1><span class="tag">Authorized internal pentest · sandbox-first</span>
  <span class="tag" id="scope">scope…</span>
  <a class="tag" href="/architecture" target="_blank" style="margin-left:auto;text-decoration:none">📐 Architecture</a>
</header>
<main>
  <div class="side">
    <div class="card">
      <label>Scan type</label>
      <select id="scantype">
        <option value="network">Network</option>
        <option value="host-linux">Host · Linux (SSH)</option>
        <option value="host-windows">Host · Windows (WinRM)</option>
        <option value="ad">Active Directory (LDAP)</option>
      </select>
      <label style="margin-top:12px"><span id="tgtlabel">Targets (one per line — lab subnet only)</span></label>
      <textarea id="targets">172.30.0.10
172.30.0.11
172.30.0.12</textarea>
      <div id="credblock" style="display:none">
        <label style="margin-top:10px">Credentials (read-only audit account)</label>
        <input id="huser" placeholder="user" value="pentest">
        <input id="hpass" type="password" placeholder="password" value="pentest" style="margin-top:6px">
      </div>
      <div id="adblock" style="display:none">
        <label style="margin-top:10px">LDAP base DN</label>
        <input id="adbase" value="dc=ecp,dc=lab">
      </div>
      <label style="margin-top:12px"><span id="proflabel">Scan profile</span></label>
      <select id="profile"></select>
      <div id="profhint" class="muted" style="font-size:11px;margin-top:4px"></div>
      <label style="margin-top:12px">AI analysis</label>
      <select id="provider"></select>
      <select id="omodel" style="margin-top:6px;display:none"></select>
      <div class="row"><input type="checkbox" id="dry" checked disabled style="width:auto">
        <label style="margin:0" id="drylabel">Server-enforced dry-run</label></div>
      <div class="row" style="margin-top:14px"><button id="run">▶ Run scan</button></div>
      <div class="row"><button class="sec" id="loadpol">Reload</button></div>
    </div>
    <div class="card">
      <label>Guardrail</label>
      <div id="polbox" class="muted" style="font-size:12px">loading…</div>
    </div>
    <div class="muted" style="font-size:11px;margin-top:auto">
      All scans pass the 7-layer guardrail. Out-of-scope or obfuscated targets are refused
      before execution. Audit chain is HMAC-verified each run.</div>
  </div>
  <div class="content">
    <div class="kpis" id="kpis"></div>
    <div id="out" class="muted">Run a scan to see findings.</div>
  </div>
</main>
<script>
const $=selector=>document.querySelector(selector);
const safeText=(value,fallback='')=>value===undefined||value===null?fallback:String(value);
const safeArray=value=>Array.isArray(value)?value:[];
const node=(tag,text='',className='')=>{
  const element=document.createElement(tag);
  if(className) element.className=className;
  element.textContent=safeText(text);
  return element;
};
const heading=text=>node('h2',text);
const SEVERITY_ORDER=Object.freeze({Critical:4,High:3,Medium:2,Low:1,Info:0});
function severityInfo(value){
  const label=Object.hasOwn(SEVERITY_ORDER,value)?value:'Info';
  return {label,className:label,rank:SEVERITY_ORDER[label]};
}
function severityBadge(value){
  const info=severityInfo(value);
  const badge=node('span',info.label);
  badge.classList.add('sev',info.className);
  return badge;
}
function appendOption(select,value,label){
  const option=document.createElement('option');
  option.value=safeText(value);
  option.textContent=safeText(label);
  select.appendChild(option);
}
function makeKpi(value,label,className){
  const card=document.createElement('div');
  card.classList.add('kpi',className);
  card.append(node('b',value),node('span',label));
  return card;
}
let PROFILES={};
let LIVE_ENABLED=false;
async function loadPolicy(){
  const p=await (await fetch('/api/policy')).json();
  PROFILES=p.profiles&&typeof p.profiles==='object'?p.profiles:{};
  LIVE_ENABLED=p.live_enabled===true;
  $('#scope').textContent='scope: '+safeArray(p.allowed).map(value=>safeText(value)).join(', ');
  const polbox=$('#polbox');
  const code=node('code',p.tool_default);
  polbox.replaceChildren(
    document.createTextNode('default: '),code,
    document.createTextNode(' · '+safeText(p.tool_count)+' tools'),document.createElement('br'),
    document.createTextNode('budget: $'+safeText(p.budget&&p.budget.usd)+' / '+
      safeText(p.budget&&p.budget.wall_s)+'s'),document.createElement('br'),
    document.createTextNode(LIVE_ENABLED?'server live mode: enabled':'server live mode: disabled')
  );
  const profiles=$('#profile');
  profiles.replaceChildren();
  Object.keys(PROFILES).forEach(key=>appendOption(
    profiles,key,key+' ('+safeArray(PROFILES[key]).length+')'
  ));
  profiles.onchange=()=>{
    $('#profhint').textContent=safeArray(PROFILES[profiles.value]).map(value=>safeText(value)).join(', ');
  };
  profiles.onchange();
  await loadModels();
  onType();
}
async function loadModels(){
  const models=await (await fetch('/api/models')).json();
  const provider=$('#provider');
  provider.replaceChildren();
  const options=[];
  if(models.anthropic) options.push(['anthropic','Claude (Haiku→Sonnet)']);
  if(models.ollama) options.push(['ollama','Local (Ollama)']);
  options.push(['heuristic','Offline heuristic']);
  options.forEach(([value,label])=>appendOption(
    provider,value,label+(value===models.active?' · active':'')
  ));
  provider.value=safeText(models.active,'heuristic');
  const ollama=$('#omodel');
  ollama.replaceChildren();
  safeArray(models.ollama_models).forEach(model=>appendOption(ollama,model,model));
  const sync=()=>{
    ollama.style.display=(provider.value==='ollama'&&ollama.options.length)?'block':'none';
  };
  provider.onchange=sync;
  sync();
}
const STATIC_PROFILES={'host-linux':['host-linux','host-linux-quick'],
  'host-windows':['host-windows','host-windows-quick'],'ad':[]};
function onType(){
  const type=$('#scantype').value;
  const hostType=type==='host-linux'||type==='host-windows';
  $('#credblock').style.display=hostType?'block':'none';
  $('#adblock').style.display=type==='ad'?'block':'none';
  $('#tgtlabel').textContent=type==='network'?
    'Targets (one per line — lab subnet only)':'Target (single host)';
  $('#drylabel').textContent=LIVE_ENABLED?'Server live mode enabled':'Server-enforced dry-run';
  const liveOnly=type!=='network';
  $('#run').disabled=liveOnly&&!LIVE_ENABLED;
  const profileLabel=$('#proflabel').parentElement;
  const profiles=$('#profile');
  if(type==='ad'){
    profiles.style.display='none';
    profileLabel.style.display='none';
    $('#profhint').textContent='';
    return;
  }
  profiles.style.display='block';
  profileLabel.style.display='block';
  const keys=type==='network'?Object.keys(PROFILES):safeArray(STATIC_PROFILES[type]);
  profiles.replaceChildren();
  keys.forEach(key=>appendOption(
    profiles,key,key+(PROFILES[key]?' ('+safeArray(PROFILES[key]).length+')':'')
  ));
  profiles.onchange=()=>{
    $('#profhint').textContent=safeArray(PROFILES[profiles.value]).map(value=>safeText(value)).join(', ');
  };
  profiles.onchange();
}
function appendFindingTable(parent,findings){
  parent.appendChild(heading('Findings'));
  const table=document.createElement('table');
  const header=document.createElement('tr');
  ['Sev','Title','Asset','CVSS','MITRE','Conf'].forEach(label=>header.appendChild(node('th',label)));
  table.appendChild(header);
  findings.forEach(finding=>{
    const row=document.createElement('tr');
    const severity=document.createElement('td');
    severity.appendChild(severityBadge(finding.severity));
    const title=node('td',finding.title);
    const asset=document.createElement('td');
    asset.appendChild(node('code',safeText(finding.affected_asset,'?')));
    const cvss=node('td',finding.cvss31_vector,'muted');
    cvss.style.fontSize='11px';
    row.append(
      severity,title,asset,cvss,node('td',finding.mitre_attack,'muted'),
      node('td',finding.confidence,'muted')
    );
    table.appendChild(row);
  });
  parent.appendChild(table);
}
function appendRemediations(parent,findings){
  if(!findings.length) return;
  parent.appendChild(heading('Remediation playbook (step-by-step)'));
  findings.forEach(finding=>{
    const card=document.createElement('div');
    card.className='path';
    card.style.borderLeftColor='var(--ok)';
    const title=document.createElement('b');
    title.append(severityBadge(finding.severity),document.createTextNode(' '+safeText(finding.title)));
    card.appendChild(title);
    const metadata=[finding.affected_asset,finding.platform,finding.mitre_attack]
      .filter(Boolean).map(value=>safeText(value)).join(' · ');
    if(metadata){
      const meta=node('div',metadata,'muted');
      meta.style.fontSize='11px';
      meta.style.margin='4px 0';
      card.appendChild(meta);
    }
    const supplied=safeArray(finding.mitigation_steps);
    const steps=supplied.length?supplied:[finding.remediation||'Review and remediate.'];
    const list=document.createElement('ol');
    list.style.margin='6px 0 0 18px';
    list.style.padding='0';
    steps.forEach(step=>list.appendChild(node('li',safeText(step).replace(/^\d+\.\s*/,''))));
    card.appendChild(list);
    parent.appendChild(card);
  });
}
function renderResult(result){
  const output=$('#out');
  const kpis=$('#kpis');
  if(result&&result.error){
    output.replaceChildren(node('span','⛔ '+safeText(result.error),'err'));
    kpis.replaceChildren();
    return;
  }
  const findings=safeArray(result&&result.findings)
    .filter(value=>value&&typeof value==='object').slice();
  findings.sort((left,right)=>severityInfo(right.severity).rank-severityInfo(left.severity).rank);
  const countSeverity=label=>findings.filter(finding=>severityInfo(finding.severity).label===label).length;
  kpis.replaceChildren(
    makeKpi(findings.length,'findings','k-blue'),
    makeKpi(countSeverity('Critical')+countSeverity('High'),'high/crit','k-red'),
    makeKpi('$'+safeText(result&&result.usd),'AI cost','k-amber'),
    makeKpi(safeText(result&&result.mode),'mode','k-green'),
    makeKpi(result&&result.audit_valid?'✓':'✗','audit chain','k-blue')
  );
  output.replaceChildren();
  const correlation=result&&result.correlation&&typeof result.correlation==='object'?
    result.correlation:{};
  if(correlation.executive_summary){
    output.append(heading('Executive summary'),node('p',correlation.executive_summary));
  }
  safeArray(correlation.attack_paths).forEach(path=>{
    if(!path||typeof path!=='object') return;
    const card=document.createElement('div');
    card.className='path';
    card.appendChild(node(
      'b',safeText(path.name)+' — '+severityInfo(path.severity).label
    ));
    const list=document.createElement('ul');
    safeArray(path.steps).forEach(step=>list.appendChild(node('li',step)));
    card.append(list,node('span',path.business_risk,'muted'));
    output.appendChild(card);
  });
  const phi=safeArray(correlation.phi_exposure);
  if(phi.length){
    output.append(heading('PHI / HIPAA exposure'),node('p',phi.map(value=>safeText(value)).join(', '),'muted'));
  }
  appendFindingTable(output,findings);
  appendRemediations(output,findings);
  const errors=safeArray(result&&result.errors);
  if(errors.length){
    output.appendChild(heading('Guardrail denials / errors'));
    errors.forEach(error=>output.appendChild(node('div','⛔ '+safeText(error),'muted')));
  }
}
async function run(){
  const button=$('#run');
  button.disabled=true;
  button.textContent='Scanning…';
  const type=$('#scantype').value;
  const targets=$('#targets').value.split('\n').map(value=>value.trim()).filter(Boolean);
  const provider=$('#provider').value;
  const ollamaModel=provider==='ollama'&&$('#omodel').value?$('#omodel').value:null;
  let url;
  let body;
  if(type==='network'){
    url='/api/scan';
    body={targets,profile:$('#profile').value,provider};
  }else if(type==='ad'){
    url='/api/ad';
    body={target:targets[0],base:$('#adbase').value,provider};
  }else{
    url='/api/host';
    body={target:targets[0],os:type==='host-windows'?'windows':'linux',
      user:$('#huser').value,password:$('#hpass').value,profile:$('#profile').value,provider};
  }
  if(ollamaModel) body.ollama_model=ollamaModel;
  try{
    const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)});
    renderResult(await response.json());
  }catch(error){
    $('#out').replaceChildren(node('span','request failed','err'));
  }
  button.textContent='▶ Run scan';
  onType();
}
window.ArgusUI=Object.freeze({renderResult,severityInfo});
$('#run').onclick=run;
$('#loadpol').onclick=loadPolicy;
$('#scantype').onchange=onType;
loadPolicy();
</script>
</body>
</html>
