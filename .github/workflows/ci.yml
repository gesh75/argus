# Argus security CI — shift-left gates for a tool that ships offensive capability.
# Hardening per OpenSSF post-tj-actions guidance: every action pinned to a full
# commit SHA (never a mutable tag), least-privilege GITHUB_TOKEN, no secrets.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: aegis

jobs:
  test:
    name: tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aegis/requirements.lock
      - name: Install deps (hash-pinned)
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
      - name: Run test suite
        run: python -m pytest -q

  sast:
    name: SAST (Bandit) — blocking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install "bandit[toml]==1.8.6"
      # Blocks the build on medium+ severity / medium+ confidence findings.
      - name: Run Bandit (medium+)
        run: bandit -c pyproject.toml -r aegis --severity-level medium --confidence-level medium

  deps:
    name: Dependency audit (pip-audit) — blocking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit==2.10.0
      # Blocks on any known CVE in the hash-pinned tree. Triage by bumping the pin
      # in requirements.txt and regenerating requirements.lock (see NEXT_STEPS.md P0.3).
      - name: Audit locked dependencies
        run: pip-audit -r requirements.lock --strict --desc

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Generate CycloneDX SBOM from the lockfile
        run: |
          pip install cyclonedx-bom==7.3.0
          cyclonedx-py requirements requirements.lock -o argus-sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: argus-sbom
          path: aegis/argus-sbom.cdx.json

  secrets:
    name: Secret scan (detect-secrets) — informational
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0
      - name: Scan working tree for secrets
        run: detect-secrets scan aegis targets
